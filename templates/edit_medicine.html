<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Medicine</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow border-0">

<div class="card-header bg-warning text-dark text-center">

<h3>

<i class="bi bi-pencil-square"></i>

Edit Medicine

</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Medicine Name

</label>

<input
type="text"
name="medicine_name"
class="form-control"
value="{{ medicine[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Dosage

</label>

<input
type="text"
name="dosage"
class="form-control"
value="{{ medicine[3] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Reminder Time

</label>

<input
type="time"
name="reminder_time"
class="form-control"
value="{{ medicine[4] }}"
required>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

Start Date

</label>

<input
type="date"
name="start_date"
class="form-control"
value="{{ medicine[5] }}"
required>

</div>

<div class="col-md-6">

<label class="form-label">

End Date

</label>

<input
type="date"
name="end_date"
class="form-control"
value="{{ medicine[6] }}"
required>

</div>

</div>

<div class="mt-4 d-grid">

<button class="btn btn-warning btn-lg">

<i class="bi bi-check-circle"></i>

Update Medicine

</button>

</div>

</form>

</div>

<div class="card-footer text-center">

<a href="/dashboard" class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>

Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
